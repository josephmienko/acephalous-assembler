name: Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  shellcheck:
    name: ShellCheck Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.3
      
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      
      - name: Run ShellCheck on shell scripts
        run: |
          find . -type f -name "*.sh" \
            -not -path "./.git/*" \
            -not -path "./.*" \
            -exec shellcheck -x {} + || true
          echo "✓ ShellCheck completed (warnings only)"

  structure:
    name: Project Structure Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.3
      
      - name: Validate directory structure
        run: |
          echo "Checking required directories..."
          test -d lib && echo "✓ lib/ exists" || (echo "✗ lib/ missing" && exit 1)
          test -d ubuntu && echo "✓ ubuntu/ exists" || (echo "✗ ubuntu/ missing" && exit 1)
          test -d debian && echo "✓ debian/ exists" || (echo "✗ debian/ missing" && exit 1)
          test -d tests && echo "✓ tests/ exists" || (echo "✗ tests/ missing" && exit 1)
          test -d ubuntu/templates && echo "✓ ubuntu/templates/ exists" || (echo "✗ ubuntu/templates/ missing" && exit 1)
          test -d debian/templates && echo "✓ debian/templates/ exists" || (echo "✗ debian/templates/ missing" && exit 1)
      
      - name: Validate required files
        run: |
          echo "Checking required files in lib/..."
          # Check common functions file
          test -f lib/_00-common-functions.sh && echo "✓ lib/_00-common-functions.sh" || (echo "✗ lib/_00-common-functions.sh missing" && exit 1)
          # Check for at least some dependency/setup files
          test -f lib/_01-*.sh && echo "✓ lib/_01-* exists" || (echo "✗ lib/_01-* missing" && exit 1)
          # Check for server startup
          test -f lib/_991-*.sh && echo "✓ lib/_991-* exists" || (echo "✗ lib/_991-* missing" && exit 1)
          
          echo "Checking required files in ubuntu/..."
          test -f ubuntu/setup.sh && echo "✓ ubuntu/setup.sh" || (echo "✗ ubuntu/setup.sh missing" && exit 1)
          test -f ubuntu/build_and_flash.sh && echo "✓ ubuntu/build_and_flash.sh" || (echo "✗ ubuntu/build_and_flash.sh missing" && exit 1)

          
          echo "Checking root dispatcher scripts..."
          test -f setup.sh && echo "✓ setup.sh" || (echo "✗ setup.sh missing" && exit 1)
          test -f build_and_flash.sh && echo "✓ build_and_flash.sh" || (echo "✗ build_and_flash.sh missing" && exit 1)
      
      - name: Make shell scripts executable
        run: |
          echo "Setting executable permissions..."
          chmod +x lib/_00-common-functions.sh
          chmod +x lib/_0[1-9]-*.sh
          chmod +x lib/_99*.sh
          chmod +x tests/run-all-tests.sh
          chmod +x ubuntu/setup.sh ubuntu/build_and_flash.sh
          chmod +x debian/setup.sh debian/build_and_flash.sh
          chmod +x setup.sh build_and_flash.sh
          echo "✓ All shell scripts set to executable"
      
      - name: Validate config.env example
        run: |
          echo "Checking config files..."
          test -f config.env.example && echo "✓ config.env.example" || (echo "✗ config.env.example missing" && exit 1)
          test -f ubuntu/config.env.example && echo "✓ ubuntu/config.env.example" || (echo "✗ ubuntu/config.env.example missing" && exit 1)
          test -f debian/config.env.example && echo "✓ debian/config.env.example" || (echo "✗ debian/config.env.example missing" && exit 1)
          echo "✓ All config files present"

  tests:
    name: Automated Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.3
      
      - name: Run test suite
        run: |
          chmod +x tests/run-all-tests.sh
          tests/run-all-tests.sh
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.5.0
        with:
          name: test-results
          path: test-results/
          retention-days: 7
        continue-on-error: true
